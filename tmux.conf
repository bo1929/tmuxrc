set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

set -g status-style bg=default
set-option -g automatic-rename on

set -g default-terminal "alacritty"
# set-option -ga terminal-overrides ",alacritty:Tc" 
# set -g default-terminal "tmux-256color"
set -sg terminal-overrides ",*:RGB"

bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy
# Move window to the left (Previous slot)
bind-key -n C-S-Left swap-window -t -1 \; select-window -t -1
# Move window to the right (Next slot)
bind-key -n C-S-Right swap-window -t +1 \; select-window -t +1
# Move left (Previous slot)
bind-key -n M-Left select-window -t -1
# Move right (Next slot)
bind-key -n M-Right select-window -t +1

set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-cowboy'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-boot-options 'alacritty'
set -g @continuum-save-interval '60'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g status-right 'C@: #{continuum_status}'

set -g @plugin 'bo1929/tmux-colors-solarized'
set -g @colors-solarized 'light'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
